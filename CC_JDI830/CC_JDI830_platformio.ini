; ******************************************************************************************
; working environment for template of custom firmware
; ******************************************************************************************
; Common build settings across this custom device
[env_CC_JDI830]
build_flags =
	${env.build_flags}												; include standard build flags
	-DMF_CUSTOMDEVICE_SUPPORT=1										; Required for Custom Devices
	-DMF_CUSTOMDEVICE_HAS_UPDATE									; if the custom device needs to be updated, uncomment this. W/o the following define it will be done each loop()
	-DMF_CUSTOMDEVICE_POLL_MS=10 									; time in ms between updating custom device, uncomment this if custom device needs to be updated regulary
	;-DHAS_CONFIG_IN_FLASH											; undefine this and add your configuration to MFCustomDevicesConfig.h to save the config in Flash !!Core FW version must be at least 2.5.2!!
	;-DREVERSED_OUTPUT_OUTPUT										; for reversed output logic on outputs
	;-DREVERSED_OUTPUT_OUTPUTSHIFTER								; for reversed output logic on outputshifter
	;-DDEBUG2CMDMESSENGER											; uncomment this to get debug messages for the connector log
	-DUSE_LANDSCAPE													; uncomment for landscape orientation (480x320)
	-I./src/src/MF_CustomDevice										; don't change this one!
	-I./CC_JDI830													; Include files for your custom device, replace "CC_JDI830" by your folder name
build_src_filter = 
	+<../CC_JDI830>													; build files for your custom device, replace "CC_JDI830" by your folder name
lib_deps =															; You can add additional libraries if required
  	lovyan03/LovyanGFX @ ^1.2.19
;custom_core_firmware_version = RP2350_support	; CAUTION check get_version.py and get_CoreFiles.py								; define the version from the core firmware files your build should base on
custom_core_firmware_version = 3.0.0	; CAUTION check get_version.py and get_CoreFiles.py								; define the version from the core firmware files your build should base on
custom_source_folder = CC_JDI830										; path to your Custom Device Sources, replace "CC_JDI830" by your folder name
custom_community_project = 	CaCraw_CC_JDI830								; Folder name inside zip file, also ZIP file name if "custom_zip_filename" is not changed
custom_zip_filename = ${env_CC_JDI830.custom_community_project}		; Name of the zip-file, overwrite it to define an different zip-file name


; Build settings for the JC3248W535EN board (AXS15231B QSPI display, ESP32-S3)
[env:cacraw_jdi830_esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_ldf_mode = deep+
board_build.arduino.memory_type = qio_opi				; use octal PSRAM for sprites
board_build.partitions = default_8MB.csv				; 8 MB flash on JC3248W535EN
build_flags =
	${env_CC_JDI830.build_flags}
	-I./src/_Boards/ESP32/ESP32S3_Devkit
	'-DMOBIFLIGHT_TYPE="CC_JDI830 S3"'
	'-DMOBIFLIGHT_NAME="CC_JDI830 S3"'
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM
	-DBUFFER_LENGTH=I2C_BUFFER_LENGTH
	-DMEMLEN_CONFIG=1500
	-DMEMLEN_NAMES_BUFFER=1000
	-DMF_MAX_DEVICEMEM=80000								; ESP32-S3 has plenty of PSRAM
build_unflags =
	-Wdeprecated-declarations
	-Wvolatile
	-DMF_SEGMENT_SUPPORT
	-DMF_LCD_SUPPORT
	-DMF_STEPPER_SUPPORT
	-DMF_SERVO_SUPPORT
	-DMF_ANALOG_SUPPORT
	-DMF_OUTPUT_SHIFTER_SUPPORT
	-DMF_INPUT_SHIFTER_SUPPORT
	-DMF_MUX_SUPPORT
	-DMF_MUX_SUPPORT
	-DMF_DIGIN_MUX_SUPPORT
	-std=gnu++14
build_src_filter =
	${env.build_src_filter}
	${env_CC_JDI830.build_src_filter}
lib_deps =
	${env.lib_deps}
	${env.custom_lib_deps_esp32}
	${env_CC_JDI830.lib_deps}
	moononournation/GFX Library for Arduino @ ^1.6.2
monitor_speed = 115200
monitor_filters = 
	esp32_exception_decoder
extra_scripts =
	${env.extra_scripts}
custom_core_firmware_version = ${env_CC_JDI830.custom_core_firmware_version}
custom_community_project = ${env_CC_JDI830.custom_community_project}
custom_source_folder = ${env_CC_JDI830.custom_source_folder}
custom_zip_filename = ${env_CC_JDI830.custom_zip_filename}


; Build settings for the Raspberry Pico2 generic
[env:cacraw_cc_jdi830_raspberrypico2A_generic]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = generic_rp2350A
framework = arduino
board_build.core = earlephilhower						; select new core
board_build.filesystem_size = 0M						; configure filesystem size. Default 0 Mbyte.
lib_ldf_mode = chain+
;upload_protocol = mbed									; for debugging upoading can be changed to picoprobe
;debug_tool = picoprobe									; and uncomment this for debugging w/ picoprobe
;board_build.arduino.earlephilhower.usb_manufacturer = Custom Manufacturer
;board_build.arduino.earlephilhower.usb_product = Ultra Cool Product
;board_build.arduino.earlephilhower.usb_vid = 0x2E8A
;board_build.arduino.earlephilhower.usb_pid = 0xF00A
build_flags =
	${env_CC_JDI830.build_flags}
	'-DMOBIFLIGHT_TYPE="CC_JDI830 RP2"'
	'-DMOBIFLIGHT_NAME="CC_JDI830 RP2"'
	-DMEMLEN_CONFIG=1500											; MUST be less than EEPROM_SIZE!! MEM_OFFSET_CONFIG + MEM_LEN_CONFIG <= EEPROM_SIZE, see: eeprom_write_block (MEM_OFFSET_CONFIG, configBuffer, MEM_LEN_CONFIG);
	-DMEMLEN_NAMES_BUFFER=1000										; max. size for configBuffer, contains only names from inputs
	-DMF_MAX_DEVICEMEM=22000											; max. memory size for devices (4000 elements × 4 bytes = 16KB on RP2350)
	-I./boards/generic_rp2350A
build_src_filter =
	${env.build_src_filter}											; don't change this one!
	${env_CC_JDI830.build_src_filter}								; don't change this one!
lib_deps =
	${env.lib_deps}													; don't change this one!
	${env_CC_JDI830.lib_deps}										; don't change this one!
	${env.custom_lib_deps_Pico}										; don't change this one!
monitor_speed = 115200
extra_scripts = 
	${env.extra_scripts}
custom_core_firmware_version = ${env_CC_JDI830.custom_core_firmware_version}	; don't change this one!
custom_community_project = ${env_CC_JDI830.custom_community_project}			; don't change this one!
custom_source_folder = ${env_CC_JDI830.custom_source_folder}					; don't change this one!
custom_zip_filename = ${env_CC_JDI830.custom_zip_filename}			; don't change this one!

